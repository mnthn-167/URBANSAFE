{% extends 'base.html' %}
{% block title %}Login - UrbanSafe{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access your UrbanSafe account</p>

        <form method="POST" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Enter your username"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input"
                    placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Demo Login Buttons -->
        <div class="demo-login-section">
            <div class="demo-divider">
                <span>or try a demo account</span>
            </div>
            <div class="demo-buttons">
                <button type="button" class="btn btn-demo btn-demo-admin" onclick="demoLogin('admin', 'admin123')">
                    <i class="fas fa-user-shield"></i>
                    <div>
                        <strong>Admin Demo</strong>
                        <small>Full dashboard access</small>
                    </div>
                </button>
                <button type="button" class="btn btn-demo btn-demo-user" onclick="demoLogin('demo', 'demo1234')">
                    <i class="fas fa-user"></i>
                    <div>
                        <strong>User Demo</strong>
                        <small>Standard citizen access</small>
                    </div>
                </button>
            </div>
        </div>

        <p class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function demoLogin(username, password) {
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('login-form').submit();
    }
</script>
{% endblock %}
